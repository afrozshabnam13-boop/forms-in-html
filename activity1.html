<html>
    <head>
        <title>personal detail form</title>
    </head>
    <body>
        <h1>Personal detail form</h1>
        <form>
            <label>name</label><br>
            <input type="text" id="name"><br>
            <label>email_id</label><br>
            <input type="text" id="email_id"><br>
            <label>contact number</label><br>
            <input type="password" id="contact"><br>
            <label>gender</label><br>
            <input type="radio" id="female" name="gender" value="female">female<br>
            <input type="radio" id="male" name="gender" value="male">male<br>
            <label>favourite city</label><br>
            <input type="checkbox" id="city" value="kolkata">kolkata<br>
            <input type="checkbox" id="city" value="mumbai">mumbai<br>
            <input type="submit">
        </form>
    </body>
    
</html>
